<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuizForge</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --surface: #ffffff;
      --surface2: #ede8df;
      --border: #d4cfc6;
      --ink: #1a1714;
      --muted: #8a857c;
      --accent: #e8401c;
      --accent-light: #fde8e3;
      --correct: #1a7a4a;
      --correct-light: #e3f5ec;
      --wrong: #c0392b;
      --wrong-light: #fde8e6;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(212,207,198,0.3) 39px, rgba(212,207,198,0.3) 40px);
    }

    .page-header {
      text-align: center;
      margin-bottom: 40px;
      animation: slideDown 0.5s ease both;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: clamp(56px, 10vw, 96px);
      letter-spacing: 4px;
      line-height: 0.9;
      color: var(--ink);
    }

    .page-title span { color: var(--accent); }

    .page-subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-top: 10px;
      letter-spacing: 0.05em;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .main-card {
      background: var(--surface);
      border: 2px solid var(--ink);
      border-radius: 4px;
      width: 100%;
      max-width: 680px;
      box-shadow: 6px 6px 0 var(--ink);
      animation: fadeIn 0.5s ease 0.1s both;
    }

    .card-header {
      background: var(--ink);
      color: var(--bg);
      padding: 16px 24px;
      font-family: var(--font-display);
      font-size: 20px;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-body { padding: 28px; }

    /* setup screen */
    .setup-screen { display: block; }
    .quiz-screen  { display: none; }
    .result-screen { display: none; }

    .field-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field-group { margin-bottom: 20px; }

    .main-input {
      width: 100%;
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 4px;
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 15px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    .main-input:focus { border-color: var(--ink); }

    .difficulty-row {
      display: flex;
      gap: 10px;
    }

    .difficulty-option {
      flex: 1;
      padding: 10px;
      border: 2px solid var(--border);
      border-radius: 4px;
      text-align: center;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.15s;
      background: var(--surface2);
    }

    .difficulty-option:hover { border-color: var(--ink); }
    .difficulty-option.selected { background: var(--ink); color: var(--bg); border-color: var(--ink); }

    .api-key-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .api-key-row .main-input { flex: 1; }

    .key-hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.5;
    }

    .key-hint a { color: var(--accent); }

    .generate-button {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: 2px solid var(--ink);
      border-radius: 4px;
      padding: 14px;
      font-family: var(--font-display);
      font-size: 22px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 4px 4px 0 var(--ink);
      margin-top: 8px;
    }

    .generate-button:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ink); }
    .generate-button:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--ink); }
    .generate-button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: 4px 4px 0 var(--ink); }

    .loading-state {
      text-align: center;
      padding: 20px 0;
    }

    .loading-bar-track {
      width: 100%;
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
      margin: 16px 0;
    }

    .loading-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      animation: loadingPulse 1.2s ease-in-out infinite;
    }

    @keyframes loadingPulse {
      0%   { width: 0%; margin-left: 0; }
      50%  { width: 60%; margin-left: 20%; }
      100% { width: 0%; margin-left: 100%; }
    }

    .loading-text {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
    }

    .error-message {
      background: var(--wrong-light);
      border: 1px solid var(--wrong);
      border-radius: 4px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--wrong);
      margin-top: 16px;
    }

    /* quiz screen */
    .progress-bar-track {
      height: 6px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.4s ease;
    }

    .quiz-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .question-counter {
      font-family: var(--font-display);
      font-size: 32px;
      letter-spacing: 2px;
      color: var(--accent);
    }

    .quiz-topic-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .question-text {
      font-size: 18px;
      font-weight: 500;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .answer-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }

    .answer-option {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border: 2px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      background: var(--surface);
      text-align: left;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      width: 100%;
    }

    .answer-option:hover:not(:disabled) { border-color: var(--ink); background: var(--surface2); }

    .answer-option:disabled { cursor: default; }

    .answer-option.correct {
      border-color: var(--correct);
      background: var(--correct-light);
      color: var(--correct);
    }

    .answer-option.wrong {
      border-color: var(--wrong);
      background: var(--wrong-light);
      color: var(--wrong);
    }

    .option-letter {
      font-family: var(--font-display);
      font-size: 18px;
      letter-spacing: 1px;
      min-width: 24px;
      color: var(--muted);
    }

    .answer-option.correct .option-letter { color: var(--correct); }
    .answer-option.wrong .option-letter { color: var(--wrong); }

    .feedback-box {
      padding: 14px 18px;
      border-radius: 4px;
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 20px;
      display: none;
    }

    .feedback-box.correct { background: var(--correct-light); color: var(--correct); border: 1px solid var(--correct); }
    .feedback-box.wrong { background: var(--wrong-light); color: var(--wrong); border: 1px solid var(--wrong); }

    .next-button {
      background: var(--ink);
      color: var(--bg);
      border: 2px solid var(--ink);
      border-radius: 4px;
      padding: 12px 28px;
      font-family: var(--font-display);
      font-size: 18px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 3px 3px 0 var(--accent);
      display: none;
    }

    .next-button:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--accent); }

    /* results screen */
    .score-display {
      text-align: center;
      padding: 20px 0 28px;
      border-bottom: 2px dashed var(--border);
      margin-bottom: 24px;
    }

    .score-number {
      font-family: var(--font-display);
      font-size: 100px;
      line-height: 1;
      color: var(--accent);
    }

    .score-label {
      font-size: 14px;
      color: var(--muted);
      margin-top: 4px;
    }

    .score-verdict {
      font-family: var(--font-display);
      font-size: 28px;
      letter-spacing: 2px;
      margin-top: 12px;
    }

    .result-breakdown {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }

    .result-question-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 4px;
      background: var(--surface2);
    }

    .result-status {
      font-family: var(--font-display);
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .result-status.ok { color: var(--correct); }
    .result-status.no { color: var(--wrong); }

    .result-question-text { line-height: 1.4; color: var(--muted); }
    .result-question-text strong { color: var(--ink); display: block; margin-bottom: 2px; }

    .restart-button {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: 2px solid var(--ink);
      border-radius: 4px;
      padding: 14px;
      font-family: var(--font-display);
      font-size: 22px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 4px 4px 0 var(--ink);
    }

    .restart-button:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ink); }
  </style>
</head>
<body>

<div class="page-header">
  <div class="page-title">QUIZ<span>FORGE</span></div>
  <div class="page-subtitle">Type a topic. Get a quiz. That simple.</div>
</div>

<div class="main-card">

  <!-- setup -->
  <div class="setup-screen" id="setupScreen">
    <div class="card-header">
      <span>NEW QUIZ</span>
      <span style="font-size:13px; font-family: var(--font-body); font-weight:500; letter-spacing:0">Powered by AI</span>
    </div>
    <div class="card-body">
      <div class="field-group">
        <div class="field-label">Topic</div>
        <input class="main-input" id="topicInput" placeholder="e.g. World War 2, Python basics, Solar System..." maxlength="80"/>
      </div>

      <div class="field-group">
        <div class="field-label">Difficulty</div>
        <div class="difficulty-row">
          <div class="difficulty-option selected" data-level="easy" onclick="selectDifficulty(this)">Easy</div>
          <div class="difficulty-option" data-level="medium" onclick="selectDifficulty(this)">Medium</div>
          <div class="difficulty-option" data-level="hard" onclick="selectDifficulty(this)">Hard</div>
        </div>
      </div>

      <div class="field-group">
        <div class="field-label">API Key</div>
        <input class="main-input" id="apiKeyInput" type="password" placeholder="Your API key"/>
        <div class="key-hint">Get a free key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>. Your key is never stored anywhere.</div>
      </div>

      <button class="generate-button" id="generateButton" onclick="startQuizGeneration()">GENERATE QUIZ</button>
      <div id="errorMessage" class="error-message" style="display:none"></div>
    </div>
  </div>

  <!-- quiz -->
  <div class="quiz-screen" id="quizScreen">
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressBarFill" style="width:0%"></div>
    </div>
    <div class="card-header">
      <span id="quizTopicHeader">QUIZ</span>
      <span id="difficultyBadge" style="font-size:13px; font-family:var(--font-body); font-weight:600; letter-spacing:0"></span>
    </div>
    <div class="card-body">
      <div class="quiz-meta">
        <div class="question-counter" id="questionCounter">1 / 5</div>
        <div class="quiz-topic-label" id="quizTopicLabel"></div>
      </div>
      <div class="question-text" id="questionText"></div>
      <div class="answer-options" id="answerOptions"></div>
      <div class="feedback-box" id="feedbackBox"></div>
      <button class="next-button" id="nextButton" onclick="moveToNextQuestion()">NEXT</button>
    </div>
  </div>

  <!-- results -->
  <div class="result-screen" id="resultScreen">
    <div class="card-header">
      <span>RESULTS</span>
    </div>
    <div class="card-body">
      <div class="score-display">
        <div class="score-number" id="scoreNumber">0</div>
        <div class="score-label" id="scoreLabel">out of 5 correct</div>
        <div class="score-verdict" id="scoreVerdict"></div>
      </div>
      <div class="result-breakdown" id="resultBreakdown"></div>
      <button class="restart-button" onclick="restartQuiz()">TRY AGAIN</button>
    </div>
  </div>

</div>

<script>
  let selectedDifficulty = 'easy';
  let currentQuestions = [];
  let currentQuestionIndex = 0;
  let userAnswers = [];
  let currentTopic = '';

  function selectDifficulty(clickedElement) {
    document.querySelectorAll('.difficulty-option').forEach(option => option.classList.remove('selected'));
    clickedElement.classList.add('selected');
    selectedDifficulty = clickedElement.dataset.level;
  }

  function showScreen(screenName) {
    document.getElementById('setupScreen').style.display = 'none';
    document.getElementById('quizScreen').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'none';
    document.getElementById(screenName).style.display = 'block';
  }

  async function startQuizGeneration() {
    const topicValue = document.getElementById('topicInput').value.trim();
    const apiKeyValue = document.getElementById('apiKeyInput').value.trim();
    const errorBox = document.getElementById('errorMessage');

    errorBox.style.display = 'none';

    if (!topicValue) {
      errorBox.textContent = 'Please enter a topic first.';
      errorBox.style.display = 'block';
      return;
    }

    if (!apiKeyValue) {
      errorBox.textContent = 'Please enter your API key.';
      errorBox.style.display = 'block';
      return;
    }

    const generateButton = document.getElementById('generateButton');
    generateButton.disabled = true;
    generateButton.textContent = 'GENERATING...';

    const loadingHtml = `
      <div class="loading-state">
        <div class="loading-text">Building your quiz on "${topicValue}"...</div>
        <div class="loading-bar-track"><div class="loading-bar-fill"></div></div>
        <div class="loading-text" style="font-size:11px; margin-top:4px">This usually takes 5-10 seconds</div>
      </div>
    `;

    document.querySelector('.card-body').insertAdjacentHTML('beforeend', loadingHtml);

    const systemPrompt = `You generate multiple choice quiz questions. Always respond with valid JSON only, no markdown, no extra text.`;

    const userPrompt = `Create 5 ${selectedDifficulty} difficulty multiple choice questions about: ${topicValue}

Return a JSON array with exactly this structure:
[
  {
    "question": "The question text here",
    "options": ["Option A", "Option B", "Option C", "Option D"],
    "correctIndex": 0,
    "explanation": "Brief explanation of why this answer is correct"
  }
]

correctIndex is 0-3 matching the options array. Make the questions genuinely interesting and educational.`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKeyValue,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1500,
          system: systemPrompt,
          messages: [{ role: 'user', content: userPrompt }]
        })
      });

      if (!response.ok) {
        const errorData = await response.json();
        throw new Error(errorData.error?.message || 'API request failed.');
      }

      const responseData = await response.json();
      const rawText = responseData.content[0].text.trim();

      let parsedQuestions;
      try {
        parsedQuestions = JSON.parse(rawText);
      } catch {
        const jsonMatch = rawText.match(/\[[\s\S]*\]/);
        if (jsonMatch) {
          parsedQuestions = JSON.parse(jsonMatch[0]);
        } else {
          throw new Error('Could not parse the quiz data. Try again.');
        }
      }

      if (!Array.isArray(parsedQuestions) || parsedQuestions.length === 0) {
        throw new Error('Received invalid quiz data. Try again.');
      }

      currentQuestions = parsedQuestions;
      currentTopic = topicValue;
      currentQuestionIndex = 0;
      userAnswers = [];

      loadQuizScreen();

    } catch (err) {
      errorBox.textContent = err.message || 'Something went wrong. Check your API key and try again.';
      errorBox.style.display = 'block';
      generateButton.disabled = false;
      generateButton.textContent = 'GENERATE QUIZ';
      const loadingEl = document.querySelector('.loading-state');
      if (loadingEl) loadingEl.remove();
    }
  }

  function loadQuizScreen() {
    document.getElementById('quizTopicHeader').textContent = currentTopic.toUpperCase();
    document.getElementById('quizTopicLabel').textContent = currentTopic;
    document.getElementById('difficultyBadge').textContent = selectedDifficulty.toUpperCase();
    showScreen('quizScreen');
    renderCurrentQuestion();
  }

  function renderCurrentQuestion() {
    const currentQuestion = currentQuestions[currentQuestionIndex];
    const totalQuestions = currentQuestions.length;

    document.getElementById('questionCounter').textContent = `${currentQuestionIndex + 1} / ${totalQuestions}`;
    document.getElementById('progressBarFill').style.width = `${(currentQuestionIndex / totalQuestions) * 100}%`;
    document.getElementById('questionText').textContent = currentQuestion.question;

    const optionLetters = ['A', 'B', 'C', 'D'];
    const answerOptionsContainer = document.getElementById('answerOptions');
    answerOptionsContainer.innerHTML = currentQuestion.options.map((optionText, optionIndex) => `
      <button class="answer-option" onclick="selectAnswer(${optionIndex})">
        <span class="option-letter">${optionLetters[optionIndex]}</span>
        <span>${optionText}</span>
      </button>
    `).join('');

    document.getElementById('feedbackBox').style.display = 'none';
    document.getElementById('feedbackBox').className = 'feedback-box';
    document.getElementById('nextButton').style.display = 'none';
  }

  function selectAnswer(chosenIndex) {
    const currentQuestion = currentQuestions[currentQuestionIndex];
    const correctIndex = currentQuestion.correctIndex;
    const isCorrect = chosenIndex === correctIndex;

    userAnswers.push({ chosenIndex, isCorrect });

    const allOptions = document.querySelectorAll('.answer-option');
    allOptions.forEach((optionButton, optionIndex) => {
      optionButton.disabled = true;
      if (optionIndex === correctIndex) optionButton.classList.add('correct');
      if (optionIndex === chosenIndex && !isCorrect) optionButton.classList.add('wrong');
    });

    const feedbackBox = document.getElementById('feedbackBox');
    feedbackBox.className = 'feedback-box ' + (isCorrect ? 'correct' : 'wrong');
    feedbackBox.textContent = (isCorrect ? 'Correct! ' : 'Not quite. ') + currentQuestion.explanation;
    feedbackBox.style.display = 'block';

    const nextButton = document.getElementById('nextButton');
    nextButton.style.display = 'inline-block';
    nextButton.textContent = currentQuestionIndex + 1 >= currentQuestions.length ? 'SEE RESULTS' : 'NEXT';
  }

  function moveToNextQuestion() {
    currentQuestionIndex++;
    if (currentQuestionIndex >= currentQuestions.length) {
      showResults();
    } else {
      renderCurrentQuestion();
    }
  }

  function showResults() {
    const correctCount = userAnswers.filter(answer => answer.isCorrect).length;
    const totalCount = currentQuestions.length;
    const percentage = Math.round((correctCount / totalCount) * 100);

    document.getElementById('scoreNumber').textContent = correctCount;
    document.getElementById('scoreLabel').textContent = `out of ${totalCount} correct (${percentage}%)`;

    let verdictText = '';
    if (percentage === 100) verdictText = 'PERFECT SCORE';
    else if (percentage >= 80) verdictText = 'GREAT JOB';
    else if (percentage >= 60) verdictText = 'NOT BAD';
    else if (percentage >= 40) verdictText = 'KEEP STUDYING';
    else verdictText = 'NEEDS WORK';

    document.getElementById('scoreVerdict').textContent = verdictText;

    const breakdownContainer = document.getElementById('resultBreakdown');
    breakdownContainer.innerHTML = currentQuestions.map((question, index) => {
      const wasCorrect = userAnswers[index]?.isCorrect;
      return `
        <div class="result-question-row">
          <div class="result-status ${wasCorrect ? 'ok' : 'no'}">${wasCorrect ? 'Y' : 'N'}</div>
          <div class="result-question-text">
            <strong>${question.question}</strong>
            Answer: ${question.options[question.correctIndex]}
          </div>
        </div>
      `;
    }).join('');

    document.getElementById('progressBarFill').style.width = '100%';
    showScreen('resultScreen');
  }

  function restartQuiz() {
    currentQuestions = [];
    currentQuestionIndex = 0;
    userAnswers = [];

    document.getElementById('generateButton').disabled = false;
    document.getElementById('generateButton').textContent = 'GENERATE QUIZ';
    document.getElementById('errorMessage').style.display = 'none';
    const loadingEl = document.querySelector('.loading-state');
    if (loadingEl) loadingEl.remove();

    showScreen('setupScreen');
  }
</script>
</body>
</html>
